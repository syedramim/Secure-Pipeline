name: Pipeline

on: [push, pull_request]

jobs:
  Build-Pipeline:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running Pipeline"
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          python-version: "3.12"
      
      - name: Install Dependencies 
