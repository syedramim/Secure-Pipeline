name: Pipeline

on: [push, pull_request]

jobs:
  Build-Pipeline:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running Pipeline"
      
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
      
      - name: Install Dependencies 
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Validation Script
        run: scripts/validate.sh

      - name: Build Docker Image
        run: docker build -t secure_ci_image .

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with: 
          image: secure_ci_image:latest
          artifact-name: sbom_secure_ci_image.cyclonedx.json
          output-file: $RUNNER_TEMP
          format: cyclonedx-json
      
      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'secure_ci_image'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          path: ${{ runner.temp }}/sbom_secure_ci_image.cyclonedx.json
          overwrite: true


      