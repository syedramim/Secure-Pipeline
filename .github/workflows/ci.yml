name: Pipeline

on: [push, pull_request]

permissions:
  contents: read

jobs:
  Build-Pipeline:
    runs-on: ubuntu-latest
    steps:      
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      - name: Install Dependencies 
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Validation Script
        run: scripts/validate.sh

      - name: Build Docker Image
        run: |
          docker build -t secure_ci_image .
          scripts/check_nonroot.sh
          sudo apt install jq
          scripts/check_container_functional.sh

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with: 
          image: secure_ci_image:latest
          artifact-name: sbom_secure_ci_image.cyclonedx.json
          output-file: ${{ runner.temp }}/sbom_secure_ci_image.cyclonedx.json
          format: cyclonedx-json
      
      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'secure_ci_image'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'
      
      - name: Security Gate Summary
        run: |
          echo "Security Gate Summary"
          echo "- Unit/API tests passed"
          echo "- Dependency audit passed"
          echo "- Secret scan passed"
          echo "- Docker image build passed"
          echo "- Non-root container validation passed"
          echo "- Runtime health check passed"
          echo "- SBOM generated"
          echo "- Critical vulnerability scan passed"


      